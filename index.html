<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Início</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="icon" href="./Imagens/icon.png" />
  </head>
  <body>
    <header>
      <img src="./Imagens/icon.png" alt="Icon" />
      <h1>Lingue</h1>
    </header>
    <h2 class="subtitulo">Aprenda um novo idioma ainda hoje</h2>
    <section class="abas">
      <h3 class="subsubsub">Os favoritos da galera</h3>
      <div class="container">
        <div class="sub-aba">
          <img src="eua_flag.png" alt="Bandeira Estados Unidos" />
          <div class="texto-aba">
            <h3>Inglês</h3>
            <p>Aprenda o idioma mais falado no mundo dos negócios</p>
          </div>
        </div>
        <div class="sub-aba">
          <img
            src="Captura de tela 2026-05-12 200205.png"
            alt="Bandeira Espanha"
          />
          <div class="texto-aba">
            <h3>Espanhol</h3>
            <p>Domine a segunda língua mais falada nas Américas</p>
          </div>
        </div>
        <div class="sub-aba">
          <img
            src="Captura de tela 2026-05-12 200139.png"
            alt="Bandeira França"
          />
          <div class="texto-aba">
            <h3>Francês</h3>
            <p>Descubra o idioma considerado o mais romântico do mundo</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
